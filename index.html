<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>JobID</title>
  <style>
    :root { --bg:#0b0d12; --fg:#f2f4f8; --muted:#8b93a7; --accent:#5b8cff; }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; }
    body {
      background:var(--bg); color:var(--fg);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      display:flex; align-items:center; justify-content:center;
      text-align:center; padding:2rem; line-height:1.5;
    }
    .wrap { max-width:560px; }
    .mark { font-size:2.75rem; font-weight:700; letter-spacing:-0.02em; }
    .mark span { color:var(--accent); }
    .tag { margin-top:1rem; color:var(--muted); font-size:1.05rem; }
    .cta { margin-top:2.25rem; font-size:0.95rem; }
    .cta a { color:var(--accent); text-decoration:none; }
    .cta a:hover { text-decoration:underline; }
    .foot { margin-top:3rem; color:var(--muted); font-size:0.8rem; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="mark">Job<span>ID</span></div>
    <p class="tag">They guess. We compute.</p>
    <p class="cta">For investor inquiries: <a href="mailto:mvh@jobid.com">mvh@jobid.com</a></p>
    <p class="foot">© 2026 JobID</p>
  </main>
</body>
</html>
